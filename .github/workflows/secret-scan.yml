name: Secret Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned to full commit SHAs (not mutable @vN tags) for supply-chain safety.
      # fetch-depth: 0 gives Gitleaks the full history to scan.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Gitleaks OSS CLI via Docker — free, no paid license required.
      # We deliberately use the CLI directly, not the licensed Marketplace action.
      # --exit-code=1 makes the job fail when secrets are detected.
      - name: Run Gitleaks (OSS CLI)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --redact --verbose --exit-code=1
