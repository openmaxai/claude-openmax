name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      # Pinned to full commit SHAs (not mutable @vN tags) for supply-chain safety.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          registry-url: 'https://registry.npmjs.org'

      # Deterministic install from the committed lockfile — pins the entire tree
      # (incl. esbuild + transitives) so the rebuilt bundle byte-matches the
      # committed dist/.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build dist bundles
        run: npm run build

      - name: Verify committed dist/ is up to date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist
            exit 1
          fi

      - name: Smoke-test bundles load with no node_modules (dependency-free)
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/dist" && cp dist/*.mjs "$tmp/dist/"
          cd "$tmp"
          node -e "import('./dist/index.mjs').then(()=>console.log('index.mjs: self-contained load OK')).catch(e=>{console.error(e); process.exit(1)})"
